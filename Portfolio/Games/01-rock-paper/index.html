<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时辰的人机对战猜拳游戏</title>
    <!-- Font Awesome 6.4.0的官方CDN样式文件，用于加载图标字体 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        /* 设置字体 */
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        width: 100%;
        background-color: rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      header {
        text-align: center;
        margin-bottom: 30px;
      }

      h1 {
        font-size: 2.8rem;
        background: linear-gradient(to right, #ff7e5f, #feb47b);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 10px;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      .subtitle {
        font-size: 1.2rem;
        color: #aaa;
        margin-bottom: 20px;
      }

      .game-area {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        margin-bottom: 30px;
      }

      .player-section,
      .computer-section {
        flex: 1;
        min-width: 300px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        transition: transform 0.3s ease;
      }

      .player-section:hover,
      .computer-section:hover {
        transform: translateY(-5px);
      }

      .section-title {
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #feb47b;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .choices {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
      }

      .choice-btn {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        border-radius: 50%;
        width: 90px;
        height: 90px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.8rem;
      }

      .choice-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
      }

      .choice-btn.active {
        background: linear-gradient(135deg, #ff7e5f, #feb47b);
        box-shadow: 0 0 20px rgba(255, 126, 95, 0.7);
      }

      .choice-icon {
        font-size: 2.5rem;
        margin-bottom: 5px;
      }

      .choice-name {
        font-size: 0.9rem;
      }

      .result-section {
        flex-basis: 100%;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        margin-top: 10px;
      }

      .result-text {
        font-size: 2rem;
        margin: 15px 0;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .win {
        color: #4ade80;
      }

      .lose {
        color: #f87171;
      }

      .draw {
        color: #fbbf24;
      }

      .scoreboard {
        display: flex;
        justify-content: space-around;
        margin-top: 20px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        padding: 15px;
      }

      .score-item {
        text-align: center;
      }

      .score-value {
        font-size: 2.5rem;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .player-score {
        color: #4ade80;
      }

      .computer-score {
        color: #f87171;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
      }

      .control-btn {
        padding: 12px 30px;
        border: none;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .play-btn {
        background: linear-gradient(135deg, #4ade80, #22c55e);
        color: white;
      }

      .reset-btn {
        background: linear-gradient(135deg, #f87171, #dc2626);
        color: white;
      }

      .control-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 7px 14px rgba(0, 0, 0, 0.2);
      }

      .history {
        margin-top: 30px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 15px;
        padding: 20px;
        max-height: 200px;
        overflow-y: auto;
      }

      .history-title {
        font-size: 1.3rem;
        margin-bottom: 15px;
        color: #feb47b;
      }

      .history-list {
        list-style-type: none;
      }

      .history-item {
        padding: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
      }

      .history-item:last-child {
        border-bottom: none;
      }

      .rules {
        margin-top: 30px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 15px;
        padding: 20px;
      }

      .rules-title {
        font-size: 1.3rem;
        margin-bottom: 15px;
        color: #feb47b;
      }

      .rules-list {
        padding-left: 20px;
        line-height: 1.6;
      }

      .rules-list li {
        margin-bottom: 8px;
      }

      @media (max-width: 768px) {
        .game-area {
          flex-direction: column;
        }

        .player-section,
        .computer-section {
          min-width: 100%;
        }

        .choices {
          flex-wrap: wrap;
        }

        .choice-btn {
          width: 80px;
          height: 80px;
        }

        h1 {
          font-size: 2.2rem;
        }
      }

      /* 动画效果 */
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      .pulse {
        animation: pulse 0.5s ease-in-out;
      }

      /* 滚动条样式 */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb {
        background: #ff7e5f;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>
          <i class="fas fa-fist-raised"></i> 石头剪刀布
          <i class="fas fa-hand-scissors"></i>
        </h1>
        <p class="subtitle">挑战AI，测试你的运气和策略！</p>
      </header>

      <div class="game-area">
        <div class="player-section">
          <h2 class="section-title"><i class="fas fa-user"></i> 玩家</h2>
          <p>请选择你的武器：</p>
          <div class="choices">
            <button class="choice-btn" data-choice="rock">
              <i class="choice-icon fas fa-fist-raised"></i>
              <span class="choice-name">石头</span>
            </button>
            <button class="choice-btn" data-choice="paper">
              <i class="choice-icon fas fa-hand-paper"></i>
              <span class="choice-name">布</span>
            </button>
            <button class="choice-btn" data-choice="scissors">
              <i class="choice-icon fas fa-hand-scissors"></i>
              <span class="choice-name">剪刀</span>
            </button>
          </div>
        </div>

        <div class="computer-section">
          <h2 class="section-title"><i class="fas fa-robot"></i> 电脑</h2>
          <p>电脑的选择：</p>
          <div class="choices">
            <div class="choice-btn" id="computer-choice">
              <i class="choice-icon fas fa-question"></i>
              <span class="choice-name">等待中</span>
            </div>
          </div>
        </div>

        <div class="result-section">
          <h2 class="section-title"><i class="fas fa-trophy"></i> 对战结果</h2>
          <div class="result-text" id="result-text">等待游戏开始...</div>

          <div class="scoreboard">
            <div class="score-item">
              <div class="score-value player-score" id="player-score">0</div>
              <div>玩家得分</div>
            </div>
            <div class="score-item">
              <div class="score-value" style="color: #fbbf24">:</div>
              <div>对战</div>
            </div>
            <div class="score-item">
              <div class="score-value computer-score" id="computer-score">
                0
              </div>
              <div>电脑得分</div>
            </div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="control-btn play-btn" id="play-btn">
          <i class="fas fa-play"></i> 开始游戏
        </button>
        <button class="control-btn reset-btn" id="reset-btn">
          <i class="fas fa-redo"></i> 重置游戏
        </button>
      </div>

      <div class="history">
        <h3 class="history-title"><i class="fas fa-history"></i> 对战记录</h3>
        <ul class="history-list" id="history-list">
          <!-- 历史记录将在这里动态添加 -->
        </ul>
      </div>

      <div class="rules">
        <h3 class="rules-title"><i class="fas fa-book"></i> 游戏规则</h3>
        <ul class="rules-list">
          <li>
            <strong>石头</strong> 击败 <strong>剪刀</strong>（石头砸坏剪刀）
          </li>
          <li><strong>剪刀</strong> 击败 <strong>布</strong>（剪刀剪开布）</li>
          <li><strong>布</strong> 击败 <strong>石头</strong>（布包住石头）</li>
          <li>相同选择则为平局</li>
          <li>每赢一局得1分，平局不得分，输局对方得1分</li>
        </ul>
      </div>
    </div>

    <script>
      // 游戏状态变量
      let playerScore = 0;
      let computerScore = 0;
      let playerChoice = null;
      let computerChoice = null;
      let gameActive = false;
      let history = [];

      // DOM元素
      const playerScoreElement = document.getElementById("player-score");
      const computerScoreElement = document.getElementById("computer-score");
      const resultTextElement = document.getElementById("result-text");
      const computerChoiceElement = document.getElementById("computer-choice");
      const playButton = document.getElementById("play-btn");
      const resetButton = document.getElementById("reset-btn");
      const historyList = document.getElementById("history-list");
      const choiceButtons = document.querySelectorAll(
        ".choice-btn[data-choice]",
      );

      // 选择图标映射
      const choiceIcons = {
        rock: "fas fa-fist-raised",
        paper: "fas fa-hand-paper",
        scissors: "fas fa-hand-scissors",
      };

      // 选择名称映射
      const choiceNames = {
        rock: "石头",
        paper: "布",
        scissors: "剪刀",
      };

      // 初始化游戏
      function initGame() {
        playerScore = 0;
        computerScore = 0;
        playerChoice = null;
        computerChoice = null;
        gameActive = false;
        history = [];

        updateScoreboard();
        resultTextElement.textContent = "等待游戏开始...";
        resultTextElement.className = "result-text";

        computerChoiceElement.innerHTML =
          '<i class="choice-icon fas fa-question"></i><span class="choice-name">等待中</span>';

        // 移除所有选择按钮的激活状态
        choiceButtons.forEach((button) => {
          button.classList.remove("active");
        });

        // 清空历史记录
        historyList.innerHTML = "";

        // 更新按钮文本
        playButton.innerHTML = '<i class="fas fa-play"></i> 开始游戏';
      }

      // 玩家选择
      choiceButtons.forEach((button) => {
        button.addEventListener("click", () => {
          if (!gameActive) return;

          // 移除所有按钮的激活状态
          choiceButtons.forEach((btn) => btn.classList.remove("active"));

          // 激活当前选择的按钮
          button.classList.add("active");

          // 设置玩家选择
          playerChoice = button.getAttribute("data-choice");

          // 启用开始游戏按钮
          playButton.disabled = false;
        });
      });

      // 电脑随机选择
      function getComputerChoice() {
        const choices = ["rock", "paper", "scissors"];
        const randomIndex = Math.floor(Math.random() * 3);
        return choices[randomIndex];
      }

      // 判断胜负
      function determineWinner(player, computer) {
        if (player === computer) return "draw";

        if (
          (player === "rock" && computer === "scissors") ||
          (player === "paper" && computer === "rock") ||
          (player === "scissors" && computer === "paper")
        ) {
          return "win";
        }

        return "lose";
      }

      // 更新分数板
      function updateScoreboard() {
        playerScoreElement.textContent = playerScore;
        computerScoreElement.textContent = computerScore;
      }

      // 添加历史记录
      function addHistory(result, player, computer) {
        const now = new Date();
        const timeString = `${now.getHours().toString().padStart(2, "0")}:${now.getMinutes().toString().padStart(2, "0")}:${now.getSeconds().toString().padStart(2, "0")}`;

        const historyItem = document.createElement("li");
        historyItem.className = "history-item";

        let resultIcon = "";
        let resultClass = "";

        if (result === "win") {
          resultIcon = '<i class="fas fa-trophy" style="color:#4ade80"></i>';
          resultClass = "win";
        } else if (result === "lose") {
          resultIcon =
            '<i class="fas fa-times-circle" style="color:#f87171"></i>';
          resultClass = "lose";
        } else {
          resultIcon = '<i class="fas fa-handshake" style="color:#fbbf24"></i>';
          resultClass = "draw";
        }

        historyItem.innerHTML = `
                <span>${timeString} - 玩家: ${choiceNames[player]} vs 电脑: ${choiceNames[computer]}</span>
                <span class="${resultClass}">${resultIcon} ${result === "win" ? "胜利" : result === "lose" ? "失败" : "平局"}</span>
            `;

        historyList.prepend(historyItem);

        // 限制历史记录最多显示10条
        if (historyList.children.length > 10) {
          historyList.removeChild(historyList.lastChild);
        }
      }

      // 玩游戏
      function playGame() {
        if (!playerChoice) {
          resultTextElement.textContent = "请先选择一个武器！";
          resultTextElement.className = "result-text lose";
          return;
        }

        // 禁用选择按钮
        choiceButtons.forEach((button) => {
          button.disabled = true;
        });

        // 电脑选择
        computerChoice = getComputerChoice();

        // 更新电脑选择显示
        computerChoiceElement.innerHTML = `<i class="choice-icon ${choiceIcons[computerChoice]}"></i><span class="choice-name">${choiceNames[computerChoice]}</span>`;
        computerChoiceElement.classList.add("pulse");

        // 判断胜负
        const result = determineWinner(playerChoice, computerChoice);

        // 更新分数
        if (result === "win") {
          playerScore++;
          resultTextElement.textContent = `你赢了！${choiceNames[playerChoice]} 击败 ${choiceNames[computerChoice]}`;
          resultTextElement.className = "result-text win";
        } else if (result === "lose") {
          computerScore++;
          resultTextElement.textContent = `你输了！${choiceNames[computerChoice]} 击败 ${choiceNames[playerChoice]}`;
          resultTextElement.className = "result-text lose";
        } else {
          resultTextElement.textContent = `平局！都是 ${choiceNames[playerChoice]}`;
          resultTextElement.className = "result-text draw";
        }

        // 更新分数板
        updateScoreboard();

        // 添加历史记录
        addHistory(result, playerChoice, computerChoice);

        // 移除脉冲动画
        setTimeout(() => {
          computerChoiceElement.classList.remove("pulse");
        }, 500);

        // 重置选择
        playerChoice = null;
        choiceButtons.forEach((button) => {
          button.classList.remove("active");
          button.disabled = false;
        });

        // 更新按钮文本
        playButton.innerHTML = '<i class="fas fa-redo"></i> 重新开始';
      }

      // 开始游戏
      playButton.addEventListener("click", () => {
        if (!gameActive) {
          // 第一次点击开始游戏
          gameActive = true;
          playButton.innerHTML = '<i class="fas fa-play"></i> 出拳！';
          resultTextElement.textContent = "请选择你的武器！";
          resultTextElement.className = "result-text";
        } else {
          // 游戏进行中，点击出拳
          playGame();
        }
      });

      // 重置游戏
      resetButton.addEventListener("click", initGame);

      // 初始化游戏
      initGame();
    </script>
  </body>
</html>
