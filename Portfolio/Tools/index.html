<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>实用小工具</title>
    <link rel="stylesheet" href="../../assets/css/common.css" />
    <script src="../../assets/js/lucide.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial;
        background: var(--bg);
        color: var(--text);
        padding: 40px 20px;
        transition:
          background 0.3s,
          color 0.3s;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: inherit;
      }
      h1 svg {
        /* stroke: var(--accent); */
        width: 28px;
        height: 28px;
      }
      .item {
        background: var(--card);
        padding: 18px 20px;
        border-radius: 10px;
        margin-bottom: 12px;
        box-shadow: var(--shadow);
        text-decoration: none;
        display: block;
        color: inherit;
      }
      .item:hover {
        transform: translateY(-4px);
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.08);
        border-color: rgba(99, 102, 241, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1><i data-lucide="wrench"></i> 实用小工具</h1>

      <!-- 你只需要在这里加项目，一行一个！ -->
      <a href="01-font-query/index.html" class="item">1. 字体查询列表</a>
    </div>

    <!-- 主题 -->
    <script type="module">
      import { initThemeToggle } from "../../assets/components/theme-toggle.js";
      initThemeToggle();
    </script>

    <script src="../../assets/components/nav.js"></script>
  </body>
</html>
