<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>时辰的前端小站</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <input type="checkbox" id="theme-toggle" hidden />

    <!-- 主题切换开关 -->
    <label for="theme-toggle" class="theme-switch" aria-label="切换暗色模式">
      <span class="icon sun"><i data-lucide="sun"></i></span>
      <span class="icon moon"><i data-lucide="moon"></i></span>
      <!-- 图标滑块 -->
      <span class="knob"></span>
    </label>

    <main class="bento">
      <!-- Hero -->
      <section class="card card--hero">
        <h1>时辰的前端小站</h1>
        <p>前端学习记录 · 刷题 · 工具 · 小游戏</p>
      </section>

      <!-- 题库 -->
      <a href="./Portfolio/QuestionBank/index.html" class="card">
        <h2>
          <i data-lucide="book-open"></i>
          题库
        </h2>
        <p>人工智能训练师五级考题</p>
      </a>

      <!-- 小工具 -->
      <a href="./Portfolio/Tools/index.html" class="card">
        <h2>
          <i data-lucide="wrench"></i>
          小工具
        </h2>
        <!-- <p>时间转换 / 密码生成 / JSON 格式化</p> -->
        <p>字体查询列表</p>
      </a>

      <!-- 小游戏 -->
      <a href="./Portfolio/Games/index.html" class="card">
        <h2>
          <i data-lucide="gamepad-2"></i>
          小游戏
        </h2>
        <!-- <p>贪吃蛇 · 2048 · 打地鼠</p> -->
        <p>人机猜拳 · 贪吃蛇</p>
      </a>

      <!-- Links -->
      <section class="card card--links">
        <h2>源码 & 仓库</h2>
        <div class="links-grid">
          <a href="https://github.com/shichen-dev" target="_blank">
            <i data-lucide="code"></i>
            <span>GitHub</span>
          </a>
          <a href="https://gitee.com/shichen-dev" target="_blank">
            <i data-lucide="git-branch"></i>
            <span>Gitee</span>
          </a>
        </div>
      </section>
    </main>

    <script>
      function initIcons() {
        lucide.createIcons();
      }

      const toggle = document.getElementById("theme-toggle");
      toggle.addEventListener("change", () => {
        document.body.dataset.theme = toggle.checked ? "dark" : "light";
        // 重新渲染
        initIcons();
      });

      // 渲染图标
      initIcons();
    </script>
  </body>
</html>
